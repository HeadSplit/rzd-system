server {
    listen 443;
    listen [::]:443;

    server_name vostochniy72.ru www.vostochniy72.ru;

    root /var/www/vostochniy72.ru/public;
    index index.php index.html index.htm;

    access_log /var/log/nginx/vostochniy72_access.log;
    error_log /var/log/nginx/vostochniy72_error.log;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.2-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
    }

    location ~ /\.ht {
        deny all;
    }
}
